name: Publish release assets

on:
  push:
    branches:
      - "release-assets/**"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release asset branch
        uses: actions/checkout@v4

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          test -f release-metadata.json
          test -f release-notes.md
          test -d release-assets

          TAG=$(python3 -c "import json; print(json.load(open('release-metadata.json', encoding='utf-8'))['tag'])")
          TITLE=$(python3 -c "import json; print(json.load(open('release-metadata.json', encoding='utf-8'))['title'])")
          PRERELEASE=$(python3 -c "import json; print(str(json.load(open('release-metadata.json', encoding='utf-8')).get('prerelease', True)).lower())")

          shopt -s nullglob
          ASSETS=(release-assets/*)
          if [ ${#ASSETS[@]} -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes-file release-notes.md --draft=false
          else
            if [ "$PRERELEASE" = "true" ]; then
              gh release create "$TAG" --title "$TITLE" --notes-file release-notes.md --prerelease
            else
              gh release create "$TAG" --title "$TITLE" --notes-file release-notes.md
            fi
          fi

          gh release upload "$TAG" "${ASSETS[@]}" --clobber
